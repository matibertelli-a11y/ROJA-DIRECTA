<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Roja Directa</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      height: 100%;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    .slider {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: none;
      justify-content: center;
      align-items: center;
    }

    .slide.active {
      display: flex;
    }

    .slide img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .nav {
      position: absolute;
      bottom: 30px;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 40px;
      box-sizing: border-box;
      z-index: 10;
    }

    .nav button {
      background: rgba(0,0,0,0.6);
      border: 1px solid #fff;
      color: white;
      font-size: 16px;
      padding: 10px 18px;
      cursor: pointer;
    }

    .nav button:hover {
      background: rgba(255,255,255,0.2);
    }
  </style>
</head>

<body>

<!-- AUDIO -->
<audio id="music" autoplay loop>
  <source src="sakaduchi.mp3" type="audio/mp3">
</audio>

<div class="slider">

  <div class="slide active"><img src="1.png" alt="1. Portada"></div>
  <div class="slide"><img src="2.png" alt="2. Información general"></div>
  <div class="slide"><img src="3.jpg" alt="3. Introducción"></div>
  <div class="slide"><img src="4.jpg" alt="4. Venado tuerto"></div>
  <div class="slide"><img src="5.jpg" alt="5. El dilema de la babosa gorda"></div>
  <div class="slide"><img src="6.jpg" alt="6. Cómo perros y gatos"></div>
  <div class="slide"><img src="7.jpg" alt="7. Demo(casi)cracia"></div>
  <div class="slide"><img src="8.jpg" alt="8. Perro amor explota"></div>
  <div class="slide"><img src="9.jpg" alt="8. Perro amor explota"></div>
  <div class="slide"><img src="10.jpg" alt="8. Perro amor explota"></div>
  <div class="slide"><img src="11.jpg" alt="8. Perro amor explota"></div>
  <div class="slide"><img src="12.jpg" alt="8. Perro amor explota"></div>
  <div class="slide"><img src="13.jpg" alt="8. Perro amor explota"></div>
  <div class="slide"><img src="14.jpg" alt="8. Perro amor explota"></div>
 
  <div class="nav">
    <button onclick="prevSlide()">◀ Anterior</button>
    <button onclick="nextSlide()">Siguiente ▶</button>
  </div>

</div>

<script>
  const slides = document.querySelectorAll('.slide');
  let current = 0;

  function showSlide(index) {
    slides.forEach(s => s.classList.remove('active'));
    slides[index].classList.add('active');
  }

  function nextSlide() {
    current = (current + 1) % slides.length;
    showSlide(current);
  }

  function prevSlide() {
    current = (current - 1 + slides.length) % slides.length;
    showSlide(current);
  }

  // Teclas ← →
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight') nextSlide();
    if (e.key === 'ArrowLeft') prevSlide();
  });

  // iOS / autoplay fix
  document.addEventListener('click', () => {
    const music = document.getElementById('music');
    if (music.paused) music.play();
  }, { once: true });
</script>

</body>
</html>
